<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>মনোপলি স্টাইল গেম</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; background: #f5f5f5; }
  #board { 
    display: grid; 
    grid-template-columns: repeat(11, 50px); 
    grid-template-rows: repeat(11, 50px); 
    gap: 2px; 
    margin: 20px auto; 
    width: max-content; 
  }
  .cell { border: 1px solid #333; background: #fff; display: flex; align-items: center; justify-content: center; position: relative; font-size: 10px; }
  .player { width: 15px; height: 15px; border-radius: 50%; position: absolute; top: 5px; left: 5px; }
  .player1 { background: red; }
  #dice { font-size: 20px; margin: 15px; padding: 10px 20px; }
  #info { margin-top: 15px; }
</style>
</head>
<body>

<h1>মনোপলি স্টাইল গেম</h1>

<div id="board"></div>

<button id="dice">ডাইস নাড়ুন</button>
<div id="info">ডাইস রোল: <span id="diceNum">0</span></div>

<script>
const boardSize = 11; // 11x11 grid
const totalCells = 40; // প্রায় 40 ঘরের মতো
const board = document.getElementById('board');
let cells = [];
let playerPos = 0;

// বোর্ড তৈরি
for (let i = 0; i < boardSize; i++) {
  for (let j = 0; j < boardSize; j++) {
    const cell = document.createElement('div');
    cell.classList.add('cell');
    board.appendChild(cell);
    cells.push(cell);
  }
}

// খেলোয়াড় গুটি
const player = document.createElement('div');
player.classList.add('player','player1');
cells[playerPos].appendChild(player);

// ডাইস রোল
document.getElementById('dice').addEventListener('click', () => {
  const dice = Math.floor(Math.random()*6)+1;
  document.getElementById('diceNum').textContent = dice;
  
  // পুরানো পজিশন থেকে সরানো
  if (player.parentNode) player.parentNode.removeChild(player);
  
  // নতুন পজিশনে স্থানান্তর
  playerPos += dice;
  if (playerPos >= totalCells) playerPos -= totalCells;
  
  cells[playerPos].appendChild(player);
});
</script>

</body>
</html>
