<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>মনোপলি বোর্ড প্রোটোটাইপ</title>
<style>
body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
#board {
  width: 600px;             /* ছবি অনুযায়ী পরিবর্তন করো */
  height: 600px;
  margin: 20px auto;
  background-image: url('https://static-01.daraz.com.bd/p/aba8495ed13118c2fc58119f5882750d.jpg'); /* এখানে তোমার ছবি রাখবে */
  background-size: cover;
  background-position: center;
  position: relative;
  border: 2px solid #333;
}
.player {
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
  position: absolute;
  transition: all 0.5s ease; /* smooth movement */
}
#dice { font-size: 16px; padding: 10px 20px; margin: 15px; cursor: pointer; }
#info { margin-top: 10px; font-size: 14px; }
</style>
</head>
<body>

<h1>মনোপলি বোর্ড প্রোটোটাইপ</h1>
<div id="board">
  <div id="player" class="player"></div>
</div>
<button id="dice">ডাইস নাড়ুন</button>
<div id="info">ডাইস রোল: <span id="diceNum">0</span></div>

<script>
// প্রতিটি ঘরের x,y কো-অর্ডিনেট (600px board ধরছি)
const positions = [
  {x: 560, y: 560}, // Start (নিচের ডান কোণ)
  {x: 500, y: 560}, // Mediterranean Avenue
  {x: 440, y: 560}, // Community Chest
  {x: 380, y: 560}, // Baltic Avenue
  {x: 320, y: 560}, // Income Tax
  {x: 260, y: 560}, // Reading Railroad
  {x: 200, y: 560}, // Oriental Avenue
  {x: 140, y: 560}, // Chance
  {x: 80, y: 560},  // Vermont Avenue
  {x: 20, y: 560},  // Connecticut Avenue
  {x: 0, y: 500},   // Jail / Just Visiting
  {x: 0, y: 440},   // St. Charles Place
  {x: 0, y: 380},   // Electric Company
  {x: 0, y: 320},   // States Avenue
  {x: 0, y: 260},   // Virginia Avenue
  {x: 0, y: 200},   // Pennsylvania Railroad
  {x: 0, y: 140},   // St. James Place
  {x: 0, y: 80},    // Community Chest
  {x: 0, y: 20},    // Tennessee Avenue
  {x: 0, y: 0},     // New York Avenue (উপরে বাম)
  {x: 60, y: 0},    // Free Parking
  {x: 120, y: 0},   // Kentucky Avenue
  {x: 180, y: 0},   // Chance
  {x: 240, y: 0},   // Indiana Avenue
  {x: 300, y: 0},   // Illinois Avenue
  {x: 360, y: 0},   // B&O Railroad
  {x: 420, y: 0},   // Atlantic Avenue
  {x: 480, y: 0},   // Ventnor Avenue
  {x: 540, y: 0},   // Water Works
  {x: 560, y: 0},   // Marvin Gardens
  {x: 580, y: 60},  // Go To Jail
  {x: 580, y: 120}, // Pacific Avenue
  {x: 580, y: 180}, // North Carolina Avenue
  {x: 580, y: 240}, // Community Chest
  {x: 580, y: 300}, // Pennsylvania Avenue
  {x: 580, y: 360}, // Short Line
  {x: 580, y: 420}, // Chance
  {x: 580, y: 480}, // Park Place
  {x: 580, y: 540}, // Luxury Tax
  {x: 560, y: 560}  // Boardwalk (ফিরে Start)
];

let playerPos = 0;
const player = document.getElementById('player');

function movePlayer() {
  const pos = positions[playerPos];
  player.style.left = pos.x + 'px';
  player.style.top = pos.y + 'px';
}

// প্রাথমিক অবস্থান
movePlayer();

// ডাইস রোল
document.getElementById('dice').addEventListener('click', () => {
  const dice = Math.floor(Math.random()*6)+1;
  document.getElementById('diceNum').textContent = dice;

  playerPos += dice;
  if(playerPos >= positions.length) playerPos -= positions.length;

  movePlayer();
});
</script>

</body>
</html>
