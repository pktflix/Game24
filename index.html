<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>হুবহু মনোপলি বোর্ড</title>
<style>
body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
#board {
  display: grid;
  grid-template-columns: repeat(11, 60px);
  grid-template-rows: repeat(11, 60px);
  gap: 2px;
  margin: 20px auto;
  width: max-content;
}
.cell {
  border: 1px solid #333;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  text-align: center;
  padding: 2px;
  position: relative;
}
.player { width: 15px; height: 15px; border-radius: 50%; position: absolute; bottom: 5px; right: 5px; background: red; }
#dice { font-size: 16px; padding: 10px 20px; margin: 15px; cursor: pointer; }
#info { margin-top: 10px; font-size: 14px; }
.icon { font-size: 16px; margin-bottom: 2px; }
</style>
</head>
<body>

<h1>হুবহু মনোপলি বোর্ড</h1>
<div id="board"></div>
<button id="dice">ডাইস নাড়ুন</button>
<div id="info">ডাইস রোল: <span id="diceNum">0</span></div>

<script>
// মোট 40 ঘর, মূল মনোপলি লেআউট
const properties = [
  {name:"GO", color:"#ffffff", icon:"➡️"},
  {name:"Mediterranean Avenue", color:"#8B4513", icon:"🏠"},
  {name:"Community Chest", color:"#ffffff", icon:"💰"},
  {name:"Baltic Avenue", color:"#8B4513", icon:"🏠"},
  {name:"Income Tax", color:"#ffffff", icon:"💵"},
  {name:"Reading Railroad", color:"#000000", icon:"🚂"},
  {name:"Oriental Avenue", color:"#ADD8E6", icon:"🏠"},
  {name:"Chance", color:"#ffffff", icon:"❓"},
  {name:"Vermont Avenue", color:"#ADD8E6", icon:"🏠"},
  {name:"Connecticut Avenue", color:"#ADD8E6", icon:"🏠"},
  {name:"Jail / Just Visiting", color:"#808080", icon:"🚔"},
  {name:"St. Charles Place", color:"#FF69B4", icon:"🏠"},
  {name:"Electric Company", color:"#ffffff", icon:"💡"},
  {name:"States Avenue", color:"#FF69B4", icon:"🏠"},
  {name:"Virginia Avenue", color:"#FF69B4", icon:"🏠"},
  {name:"Pennsylvania Railroad", color:"#000000", icon:"🚂"},
  {name:"St. James Place", color:"#FFA500", icon:"🏠"},
  {name:"Community Chest", color:"#ffffff", icon:"💰"},
  {name:"Tennessee Avenue", color:"#FFA500", icon:"🏠"},
  {name:"New York Avenue", color:"#FFA500", icon:"🏠"},
  {name:"Free Parking", color:"#ffffff", icon:"🅿️"},
  {name:"Kentucky Avenue", color:"#FF0000", icon:"🏠"},
  {name:"Chance", color:"#ffffff", icon:"❓"},
  {name:"Indiana Avenue", color:"#FF0000", icon:"🏠"},
  {name:"Illinois Avenue", color:"#FF0000", icon:"🏠"},
  {name:"B&O Railroad", color:"#000000", icon:"🚂"},
  {name:"Atlantic Avenue", color:"#FFFF00", icon:"🏠"},
  {name:"Ventnor Avenue", color:"#FFFF00", icon:"🏠"},
  {name:"Water Works", color:"#ffffff", icon:"💧"},
  {name:"Marvin Gardens", color:"#FFFF00", icon:"🏠"},
  {name:"Go To Jail", color:"#808080", icon:"🚔"},
  {name:"Pacific Avenue", color:"#008000", icon:"🏠"},
  {name:"North Carolina Avenue", color:"#008000", icon:"🏠"},
  {name:"Community Chest", color:"#ffffff", icon:"💰"},
  {name:"Pennsylvania Avenue", color:"#008000", icon:"🏠"},
  {name:"Short Line", color:"#000000", icon:"🚂"},
  {name:"Chance", color:"#ffffff", icon:"❓"},
  {name:"Park Place", color:"#0000FF", icon:"🏠"},
  {name:"Luxury Tax", color:"#ffffff", icon:"💰"},
  {name:"Boardwalk", color:"#0000FF", icon:"🏠"}
];

// বোর্ডে ঘর তৈরি
const board = document.getElementById('board');
const cells = [];
for(let i=0;i<properties.length;i++){
  const cell = document.createElement('div');
  cell.classList.add('cell');
  cell.style.backgroundColor = properties[i].color;
  cell.innerHTML = `<div class="icon">${properties[i].icon}</div>${properties[i].name}`;
  board.appendChild(cell);
  cells.push(cell);
}

// খেলোয়াড় গুটি
let playerPos = 0;
const player = document.createElement('div');
player.classList.add('player');
cells[playerPos].appendChild(player);

// ডাইস রোল
document.getElementById('dice').addEventListener('click', () => {
  const dice = Math.floor(Math.random()*6)+1;
  document.getElementById('diceNum').textContent = dice;
  
  // পুরানো পজিশন থেকে সরানো
  if(player.parentNode) player.parentNode.removeChild(player);
  
  // নতুন পজিশনে স্থানান্তর
  playerPos += dice;
  if(playerPos >= cells.length) playerPos -= cells.length;
  
  cells[playerPos].appendChild(player);
});
</script>

</body>
</html>
